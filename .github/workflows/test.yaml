name: Test

on: pull_request

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
      - run: npm ci
      - run: docker compose up -d
      - run: npm run test:ci-integration
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/bidding-system-db?schema=public
